name: Render Quarto
on: [push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: quarto-dev/quarto-actions/setup@v2
      - run: quarto render report/lab_notes.qmd
      - uses: actions/upload-artifact@v4
        with:
          name: lab-notes
          path: report/lab_notes.html
